<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tickets - RedTicket</title>
  <link rel="stylesheet" th:href="@{/style.css}">
  <style>
    /* RedTicket Refined Theme */
    :root {
      --bg-ultra-dark: #0a0a0a;
      --module-bg: #141414;
      --accent-red: #e50914;
      --border-muted: #222;
      --text-dim: #888;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-ultra-dark);
      margin: 0;
      padding: 0;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      max-width: 850px;
      margin: 0 auto;
      padding: 60px 20px;
      flex: 1;
    }

    /* Simple Header */
    .page-header {
      margin-bottom: 40px;
      border-left: 4px solid var(--accent-red);
      padding-left: 20px;
    }

    .page-header h1 {
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -1px;
      margin: 0;
    }

    .header-sub {
      color: var(--text-dim);
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 5px;
    }

    /* Ticket Stub Module */
    .ticket-card {
      background: var(--module-bg);
      border: 1px solid var(--border-muted);
      border-radius: 8px;
      margin-bottom: 25px;
      display: flex;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .ticket-card:hover {
      border-color: #333;
    }

    /* Main Ticket Info */
    .ticket-main {
      flex: 1;
      padding: 25px 30px;
    }

    .ticket-id {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 10px;
      display: block;
    }

    .movie-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0 0 20px 0;
      color: #fff;
    }

    .info-row {
      display: flex;
      gap: 30px;
    }

    .info-group {
      display: flex;
      flex-direction: column;
    }

    .info-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 1rem;
      font-weight: 700;
      color: #eee;
    }

    /* Perforated Stub Section */
    .ticket-stub {
      width: 160px;
      background: #111;
      border-left: 2px dashed var(--bg-ultra-dark);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    /* Punch-out holes for ticket feel */
    .ticket-stub::before, .ticket-stub::after {
      content: '';
      position: absolute;
      left: -11px;
      width: 20px;
      height: 20px;
      background: var(--bg-ultra-dark);
      border-radius: 50%;
    }
    .ticket-stub::before { top: -10px; }
    .ticket-stub::after { bottom: -10px; }

    .status-text {
      font-size: 0.75rem;
      font-weight: 800;
      color: #28a745; /* Clean Green */
      text-transform: uppercase;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    .stub-price {
      font-size: 1.3rem;
      font-weight: 900;
      margin-bottom: 20px;
    }

    .cancel-btn {
      background: transparent;
      border: 1px solid #333;
      color: var(--text-dim);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
    }

    .cancel-btn:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      border: 2px dashed #222;
      border-radius: 8px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
  <header class="page-header">
    <h1>My <span style="color: var(--accent-red);">Tickets</span></h1>
    <p class="header-sub">Your upcoming and past movie bookings</p>
  </header>

  <div th:if="${not #lists.isEmpty(history)}">
    <div th:each="ticket : ${history}" class="ticket-card">

      <div class="ticket-main">
        <span class="ticket-id" th:text="'Ticket #' + ${ticket.id}">Ticket #0000</span>
        <h2 class="movie-title" th:text="${ticket.movie.title}">Movie Title</h2>

        <div class="info-row">
          <div class="info-group">
            <span class="info-label">Seat</span>
            <span class="info-value" th:text="${ticket.seat.seatNumber}">C5</span>
          </div>
          <div class="info-group">
            <span class="info-label">Time</span>
            <span class="info-value" th:text="${ticket.movie.show_time_hour + ':' + (ticket.movie.show_time_minute < 10 ? '0' + ticket.movie.show_time_minute : ticket.movie.show_time_minute)}">00:00</span>
          </div>
          <div class="info-group">
            <span class="info-label">Length</span>
            <span class="info-value" th:text="${ticket.movie.runtime_hour + 'h ' + ticket.movie.runtime_minute + 'm'}">1h 45m</span>
          </div>
        </div>
      </div>

      <div class="ticket-stub">
        <div class="status-text">Confirmed</div>
        <div class="stub-price" th:text="'$' + ${#numbers.formatDecimal(ticket.cost, 1, 2)}">$0.00</div>

        <form th:action="@{/tickets/delete/{id}(id=${ticket.id})}" method="post" style="width: 100%;">
          <button type="submit" class="cancel-btn">Cancel</button>
        </form>
      </div>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(history)}" class="empty-state">
    <p>No tickets found</p>
    <a th:href="@{/AllMovies}" style="color: var(--accent-red); text-decoration: none; font-weight: bold; margin-top: 15px; display: inline-block; text-transform: uppercase; font-size: 0.8rem;">Browse Movies</a>
  </div>
</div>

</body>
</html>
