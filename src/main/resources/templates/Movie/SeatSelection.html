<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Seat | RedTicket</title>
    <style>
        :root {
            --red: #e50914;
            --dark-red: #b20710;
            --bg: #0f0f0f;
            --panel-bg: #1a1a1a;
            --border: #333;
            --seat-free: #262626;
            --seat-occ: #111;
            --sharp-radius: 4px; /* Keeping it sharp */
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .theater-container {
            background: var(--panel-bg);
            border: 2px solid var(--border);
            border-radius: var(--sharp-radius);
            padding: 50px;
            max-width: 850px;
            width: 100%;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.5); /* Hard shadow */
            text-align: center;
        }

        /* Header - Sharp & Bold */
        .selection-header h2 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0;
            font-weight: 900;
        }

        .movie-runtime {
            color: var(--red);
            font-weight: 700;
            margin-top: 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* Sharp 3D Screen */
        .screen-container {
            perspective: 1000px;
            margin: 50px 0;
        }

        .screen {
            background: #eee;
            height: 10px;
            width: 90%;
            margin: 0 auto;
            transform: rotateX(-40deg);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            border: 1px solid #fff;
        }

        /* Perspective Grid */
        .seat-grid-wrapper {
            perspective: 1200px;
            margin-bottom: 40px;
        }

        .seat-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 15px;
            max-width: 672px;
            margin: 0 auto;
            transform: rotateX(15deg);
        }

        .seat-radio { display: none; }

        .seat-label {
            width: 60px;
            height: 50px;
            background: var(--seat-free);
            border: 1px solid var(--border);
            border-bottom: 6px solid #000; /* Sharp 3D thickness */
            border-radius: var(--sharp-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 800;
            color: #555;
            transition: all 0.1s;
        }

        .seat-label:hover:not(.occupied) {
            border-color: var(--red);
            color: #fff;
            transform: translateY(-2px);
        }

        /* Sharp Selected State */
        .seat-radio:checked + .seat-label {
            background: var(--red);
            color: #fff;
            border-color: #ff4d4d;
            border-bottom: 2px solid var(--dark-red);
            transform: translateY(2px); /* "Pressed" effect */
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }

        /* Occupied State */
        .seat-label.occupied {
            background: var(--seat-occ);
            border-color: #222;
            color: #222;
            cursor: not-allowed;
            border-bottom: 2px solid #000;
        }

        /* Sharp Legend */
        .legend {
            display: inline-flex;
            gap: 25px;
            padding: 15px 30px;
            border: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #888;
        }

        .legend-box {
            width: 12px;
            height: 12px;
            border: 1px solid var(--border);
        }

        /* Buttons - Flat & Sharp */
        .btn-group {
            display: flex;
            gap: 10px;
        }

        .confirm-btn {
            flex: 2;
            background: var(--red);
            color: white;
            border: none;
            padding: 18px;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: var(--sharp-radius);
            transition: background 0.2s;
        }

        .confirm-btn:hover {
            background: var(--dark-red);
        }

        .back-btn {
            flex: 1;
            background: #333;
            color: #fff;
            text-decoration: none;
            padding: 18px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--sharp-radius);
        }

        .back-btn:hover {
            background: #444;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="main-content">
    <div class="theater-container">

        <div class="selection-header">
            <h2 th:text="${isEditing} ? 'Change Reservation' : 'Select Seat'">Select Seat</h2>
            <div class="movie-runtime">
                <span th:text="${movie.title}">Movie Title</span> |
                <span th:text="${movie.runtime_hour} + 'H ' + ${movie.runtime_minute} + 'M'">1H 49M</span>
            </div>
        </div>

        <div class="screen-container">
            <div class="screen"></div>
        </div>

        <form th:action="${isEditing} ? @{/UpdateTicket} : @{/AddToCart}" method="post">
            <input type="hidden" name="movieId" th:value="${movie.id}" th:if="${!isEditing}">
            <input type="hidden" name="ticketId" th:value="${existingTicketId}" th:if="${isEditing}">
            <input type="hidden" name="newSeatId" th:if="${isEditing}" id="newSeatId">

            <div class="seat-grid-wrapper">
                <div class="seat-grid">
                    <div th:each="seat : ${seats}">
                        <input type="radio"
                               th:id="${'seat-' + seat.id}"
                               name="seatId"
                               th:value="${seat.id}"
                               class="seat-radio"
                               th:disabled="${#lists.contains(occupiedSeatIds, seat.id)}"
                               th:onclick="${isEditing} ? 'document.getElementById(\'newSeatId\').value=this.value' : ''">
                        <label th:for="${'seat-' + seat.id}"
                               class="seat-label"
                               th:classappend="${#lists.contains(occupiedSeatIds, seat.id)} ? 'occupied' : ''">
                            <span th:text="${seat.seatNumber}"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-box" style="background: var(--seat-free);"></div> Available
                </div>
                <div class="legend-item">
                    <div class="legend-box" style="background: var(--red);"></div> Selected
                </div>
                <div class="legend-item">
                    <div class="legend-box" style="background: var(--seat-occ);"></div> Taken
                </div>
            </div>

            <div class="btn-group">
                <a th:href="@{/MoviePage/{id}(id=${movie.id})}" class="back-btn">Back</a>
                <button type="submit" class="confirm-btn"
                        th:text="${isEditing} ? 'Confirm Change' : 'Book Ticket'">
                    Book Ticket
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
