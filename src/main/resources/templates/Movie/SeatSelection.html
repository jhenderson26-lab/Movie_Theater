<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: common-head}">
    <title></title>
</head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Seat | RedTicket</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #b20710;
            --bg-black: #050505;
            --panel-bg: #111111;
            --border-gray: #2a2a2a;
            --seat-free: #222222;
            --seat-occ: #0a0a0a;
            --sharp: 2px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at 50% -20%, rgba(255, 0, 0, 0.1) 0%, transparent 50%);
            margin: 0;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .theater-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-gray);
            border-radius: var(--sharp);
            padding: 60px 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            text-align: center; /* Ensures global centering */
        }

        /* 1. FIXED HEADER ALIGNMENT */
        .selection-header {
            margin-bottom: 40px;
            display: inline-block; /* Wraps content for the red border effect */
            border-left: 4px solid var(--primary-red);
            padding: 0 20px;
            text-align: left; /* Keeps text left-aligned inside the centered box */
        }

        .selection-header h2 {
            font-size: 2.4rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -1px;
            line-height: 1;
        }

        .movie-runtime {
            color: var(--primary-red);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* 2. CENTERED SCREEN & TEXT */
        .screen-container {
            perspective: 1000px;
            margin: 20px 0 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen {
            background: #ffffff;
            height: 6px;
            width: 80%;
            border-radius: 10px;
            box-shadow: 0 0 25px #fff, 0 5px 50px rgba(255, 255, 255, 0.2);
            transform: rotateX(-30deg);
        }

        .screen-label {
            color: #444;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-top: 15px;
            font-weight: 900;
        }

        /* 3. SEAT GRID ALIGNMENT */
        .seat-grid-wrapper {
            perspective: 1200px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }

        .seat-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 672px; /* Tighter grid for better symmetry */
            transform: rotateX(12deg);
        }

        .seat-radio { display: none; }

        .seat-label {
            width: 100%;
            aspect-ratio: 1.1 / 1;
            background: var(--seat-free);
            border: 1px solid var(--border-gray);
            border-bottom: 5px solid #000;
            border-radius: var(--sharp);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.8rem;
            color: #555;
            transition: all 0.1s;
        }

        .seat-label:hover:not(.occupied) {
            border-color: #666;
            color: #fff;
        }

        .seat-radio:checked + .seat-label {
            background: var(--primary-red);
            color: white;
            border-color: #ff4d4d;
            border-bottom: 2px solid var(--dark-red);
            transform: translateY(3px); /* Press down effect */
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        .seat-label.occupied {
            background: var(--seat-occ);
            border-color: #1a1a1a;
            color: #222;
            cursor: not-allowed;
            border-bottom: 2px solid #000;
        }

        /* 4. BALANCED LEGEND */
        .legend {
            display: inline-flex;
            gap: 20px;
            padding: 12px 30px;
            background: #0a0a0a;
            border: 1px solid var(--border-gray);
            border-radius: var(--sharp);
            margin-bottom: 40px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #666;
        }

        .legend-box {
            width: 12px;
            height: 12px;
            border-radius: 1px;
        }

        /* 5. MATCHING BUTTON HEIGHTS */
        .btn-group {
            display: flex;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
            align-items: stretch; /* Forces equal height */
        }

        .confirm-btn, .back-btn {
            padding: 20px;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: var(--sharp);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: none;
        }

        .confirm-btn {
            flex: 2;
            background: var(--primary-red);
            color: #000;
            box-shadow: 0 4px 0px var(--dark-red);
            position: relative;
            top: -4px; /* Offsets shadow for center alignment */
        }

        .confirm-btn:hover {
            background: #ff3333;
            top: -5px;
            box-shadow: 0 5px 0px var(--dark-red);
        }

        .confirm-btn:active {
            top: 0;
            box-shadow: 0 0px 0px var(--dark-red);
        }

        .back-btn {
            flex: 1;
            background: #222;
            color: #fff;
            text-decoration: none;
            border: 1px solid var(--border-gray);
        }

        .back-btn:hover {
            background: #333;
        }

    </style>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="main-content">
    <div class="theater-container">

        <div class="selection-header">
            <h2 th:text="${isEditing} ? 'Modify Seat' : 'Seat Selection'">Seat Selection</h2>
            <div class="movie-runtime">
                <span th:text="${movie.title}">JOHN WICK</span> •
                <span th:text="${movie.runtime_hour} + 'H ' + ${movie.runtime_minute} + 'M'">1H 41M</span>
            </div>
        </div>

        <div class="screen-container">
            <div class="screen"></div>
            <div class="screen-label">Front of Stage</div>
        </div>

        <form th:action="${isEditing} ? @{/UpdateTicket} : @{/AddToCart}" method="post">
            <input type="hidden" name="movieId" th:value="${movie.id}" th:if="${!isEditing}">
            <input type="hidden" name="ticketId" th:value="${existingTicketId}" th:if="${isEditing}">
            <input type="hidden" name="newSeatId" th:if="${isEditing}" id="newSeatId">

            <div class="seat-grid-wrapper">
                <div class="seat-grid">
                    <div th:each="seat : ${seats}">
                        <input type="radio" th:id="${'seat-' + seat.id}" name="seatId" th:value="${seat.id}" class="seat-radio"
                               th:disabled="${#lists.contains(occupiedSeatIds, seat.id)}"
                               th:onclick="${isEditing} ? 'document.getElementById(\'newSeatId\').value=this.value' : ''">
                        <label th:for="${'seat-' + seat.id}" class="seat-label" th:classappend="${#lists.contains(occupiedSeatIds, seat.id)} ? 'occupied' : ''">
                            <span th:text="${seat.seatNumber}"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item"><div class="legend-box" style="background: var(--seat-free); border: 1px solid var(--border-gray);"></div> Available</div>
                <div class="legend-item"><div class="legend-box" style="background: var(--primary-red);"></div> Selected</div>
                <div class="legend-item"><div class="legend-box" style="background: var(--seat-occ);"></div> Taken</div>
            </div>

            <div class="btn-group">
                <a th:href="@{/MoviePage/{id}(id=${movie.id})}" class="back-btn">Cancel</a>
                <button type="submit" class="confirm-btn" th:text="${isEditing} ? 'Confirm Change' : 'Reserve Seat'">Reserve Seat</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
