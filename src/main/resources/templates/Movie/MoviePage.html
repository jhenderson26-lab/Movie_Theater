<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie?.title} + ' - RedTicket'">Movie Details</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        /* Apple-Style Glassmorphism Theme */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f2f2f7;
            margin: 0;
            padding: 0;
            color: #1c1c1e;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Glassmorphism Container */
        .movie-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }

        .genre-badge {
            display: inline-block;
            background: rgba(88, 86, 214, 0.1);
            color: #5856D6;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .movie-meta {
            display: flex;
            gap: 20px;
            color: #8e8e93;
            font-size: 0.95rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .description-box {
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 30px;
            margin-bottom: 40px;
        }

        .description-box h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .description-text {
            line-height: 1.6;
            color: #3a3a3c;
            font-size: 1.05rem;
        }

        /* Booking Section */
        .booking-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 30px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .price-section {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.8rem;
            color: #8e8e93;
            font-weight: 600;
        }

        .price-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1c1c1e;
        }

        /* Action Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .apple-btn {
            background-color: #5856D6; /* iOS Purple */
            color: white;
            padding: 16px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(88, 86, 214, 0.25);
            border: none;
            cursor: pointer;
        }

        .apple-btn:hover {
            background-color: #434190;
            transform: scale(1.03);
            box-shadow: 0 12px 25px rgba(88, 86, 214, 0.35);
        }

        .back-link {
            color: #8e8e93;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #5856D6;
        }

        /* Error state */
        .error-card {
            text-align: center;
            padding: 60px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="main-content">
    <div th:if="${movie != null}" class="movie-card">
        <div class="genre-badge" th:text="${movie.genre}">GENRE</div>

        <h1 th:text="${movie.title}">Movie Title</h1>

        <div class="movie-meta">
            <span th:text="${#temporals.format(movie.releaseYear, 'yyyy')}">2024</span>
            <span>•</span>
            <span th:text="${movie.show_time_hour} + 'h ' + ${movie.show_time_minute} + 'm'">2h 15m</span>
        </div>

        <div class="description-box">
            <h3>Synopsis</h3>
            <p class="description-text" th:text="${movie.description}">No description available.</p>
        </div>

        <div class="booking-footer">
            <div class="price-section">
                <span class="price-label">Ticket Price</span>
                <span class="price-value" th:text="'$' + ${#numbers.formatDecimal(movie.cost, 1, 2)}">$0.00</span>
            </div>

            <div class="btn-group">
                <a th:href="@{/AllMovies}" class="back-link">Cancel</a>
                <a th:href="@{/TicketBooking/{id}(id=${movie.id})}" class="apple-btn">
                    Book Tickets
                </a>
            </div>
        </div>
    </div>

    <div th:unless="${movie != null}" class="movie-card error-card">
        <h2 style="color: #ff3b30;">Movie Not Found</h2>
        <p>We couldn't find the details for this movie. It may have been removed or the ID is incorrect.</p>
        <a th:href="@{/AllMovies}" class="apple-btn" style="display: inline-block; margin-top: 20px;">Return to Catalog</a>
    </div>
</div>

</body>
</html>
