<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie?.title} + ' - RedTicket'">Movie Details</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        /* RedTicket Dark Theme Aesthetic */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f0f0f; /* Deep black/grey background */
            margin: 0;
            padding: 0;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Dark Card Style from Image 1 */
        .movie-card {
            background: #1a1a1a; /* Dark grey card */
            border-radius: 12px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a2a;
        }

        .genre-badge {
            display: inline-block;
            color: #e50914; /* Red accent */
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .movie-meta {
            display: flex;
            gap: 15px;
            color: #999;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .description-box {
            border-top: 1px solid #333;
            padding-top: 25px;
            margin-bottom: 35px;
        }

        .description-box h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .description-text {
            line-height: 1.6;
            color: #e0e0e0;
            font-size: 1.1rem;
        }

        /* Booking Section */
        .booking-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 30px;
            border-top: 1px solid #333;
        }

        .price-section {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.75rem;
            color: #888;
            font-weight: 700;
            text-transform: uppercase;
        }

        .price-value {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
        }

        /* Action Buttons from Screenshots */
        .btn-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* Red Primary Button */
        .btn-book {
            background-color: #e50914;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: background 0.2s ease;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .btn-book:hover {
            background-color: #b20710;
        }

        /* Grey Secondary Button */
        .btn-cancel {
            background-color: #3d3d3d;
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s ease;
            text-align: center;
        }

        .btn-cancel:hover {
            background-color: #4f4f4f;
        }

        /* Error state */
        .error-card {
            text-align: center;
            padding: 60px;
        }

        /* Navbar aesthetic sync */
        .main-header {
            background-color: #000000;
            border-bottom: 3px solid #e50914;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="main-content">
    <div th:if="${movie != null}" class="movie-card">
        <div class="genre-badge" th:text="${movie.genre}">GENRE</div>

        <h1 th:text="${movie.title}">Movie Title</h1>

        <div class="movie-meta">
            <span th:text="${#temporals.format(movie.releaseYear, 'yyyy')}">2024</span>
            <span style="color: #e50914;">•</span>
            <span th:text="${movie.runtime_hour} + 'h ' + ${movie.runtime_minute} + 'm'">2h 15m</span>
        </div>

        <div class="description-box">
            <h3>Synopsis</h3>
            <p class="description-text" th:text="${movie.description}">No description available.</p>
        </div>

        <div class="booking-footer">
            <div class="price-section">
                <span class="price-label">Price per Ticket</span>
                <span class="price-value" th:text="'$' + ${#numbers.formatDecimal(movie.cost, 1, 2)}">$0.00</span>
            </div>

            <div class="btn-group">
                <a th:href="@{/AllMovies}" class="btn-cancel">Cancel</a>
                <a th:href="@{/TicketBooking/{id}(id=${movie.id})}" class="btn-book">
                    Book Tickets
                </a>
            </div>
        </div>
    </div>

    <div th:unless="${movie != null}" class="movie-card error-card">
        <h2 style="color: #e50914;">Movie Not Found</h2>
        <p style="color: #999;">We couldn't find the details for this movie. It may have been removed.</p>
        <a th:href="@{/AllMovies}" class="btn-book" style="display: inline-block; margin-top: 20px;">Return to Catalog</a>
    </div>
</div>

</body>
</html>
