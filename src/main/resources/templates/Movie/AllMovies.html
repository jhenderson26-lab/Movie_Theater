<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Showings - Red Ticket Cinema</title>

    <style>
        /* Shared Theme Variables */
        :root {
            --bg-dark: #121212;
            --card-bg: #1c1c1c;
            --input-bg: #2a2a2a;
            --primary-red: #e50914;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --card-border: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .header-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            margin-bottom: 10px;
            text-align: left;
            letter-spacing: -1px;
        }

        .header-subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .text-red {
            color: var(--primary-red);
        }

        /* Movie Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Dark Cinematic Card */
        .movie-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--card-border);
            padding: 28px;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .movie-card:hover {
            transform: translateY(-10px);
            border-color: rgba(229, 9, 20, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .movie-genre {
            display: inline-block;
            background-color: var(--input-bg);
            color: var(--primary-red);
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            width: fit-content;
        }

        .movie-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            color: var(--text-main);
            line-height: 1.2;
        }

        /* Showtime and Room Styling */
        .showtime-info {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .info-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fff;
        }

        .info-tag span {
            color: var(--primary-red);
        }

        .movie-details {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Reduced to 2 lines to make room for showtime */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--input-bg);
        }

        .price-tag {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .price-label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .view-btn {
            background-color: var(--primary-red);
            color: white;
            padding: 10px 22px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .view-btn:hover {
            background-color: #ff1e27;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 120px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px dashed var(--input-bg);
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--input-bg); border-radius: 5px; }
    </style>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <header>
        <h1 class="header-title">Now <span class="text-red">Showing</span></h1>
        <p class="header-subtitle">Select a movie to view showtimes and reserve your seats.</p>
    </header>

    <div th:if="${not #lists.isEmpty(Movielist)}" class="movie-grid">
        <div th:each="movie : ${Movielist}" class="movie-card">
            <div sec:authorize="hasRole('ADMIN')">
                <form th:action="@{/EditingMoviePage}" method="post">
                    <input type="hidden" name="id" th:value="${movie.id}">
                    <button>edit</button>
                </form>
                <form th:action="@{/DeleteMovie}" method="post">
                    <button>X</button>
                </form>
            </div>
            <div class="card-content">
                <span class="movie-genre" th:text="${movie.genre}">GENRE</span>
                <h2 class="movie-title" th:text="${movie.title}">Movie Title</h2>

                <div class="showtime-info">
                    <div class="info-tag">
                        <span>🕒</span>
                        <th:block th:text="${movie.show_time_hour + ':' + (movie.show_time_minute < 10 ? '0' + movie.show_time_minute : movie.show_time_minute)}"></th:block>
                    </div>
                    <div class="info-tag" th:if="${not #lists.isEmpty(movie.rooms)}">
                        <span>🎬</span>
                        <th:block th:text="${movie.rooms[0].name}"></th:block>
                    </div>
                </div>

                <p class="movie-details" th:text="${movie.description}">
                    Short movie description.
                </p>
            </div>

            <div class="card-footer">
                <div class="price-container">
                    <span class="price-label">Ticket Price</span>
                    <span class="price-tag" th:text="'$' + ${#numbers.formatDecimal(movie.cost, 1, 2)}">$0.00</span>
                </div>
                <a th:href="@{/MoviePage/{id}(id=${movie.id})}" class="view-btn">View Details</a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(Movielist)}" class="empty-state">
        <p>The projector is cooling down. No movies currently scheduled.</p>
        <a href="/" class="text-red" style="text-decoration: none; font-weight: bold;">Return to Home</a>
    </div>
</div>

</body>
</html>
