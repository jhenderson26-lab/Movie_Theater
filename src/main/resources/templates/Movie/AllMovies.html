<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="~{fragments :: common-head}">
    <title></title>
</head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now Showing - RedTicket Cinema</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <style>
        /* RedTicket Architectural Theme */
        :root {
            --bg-ultra-dark: #0a0a0a;
            --module-bg: #141414;
            --accent-red: #e50914;
            --border-muted: #222;
            --text-dim: #666;
        }

        body {
            background-color: var(--bg-ultra-dark);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1250px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .page-header {
            margin-bottom: 60px;
            border-left: 4px solid var(--accent-red);
            padding-left: 20px;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0;
        }

        /* Admin Maintenance Bar */
        .admin-controls {
            background: #1c1c1c;
            border-bottom: 1px solid var(--border-muted);
            padding: 8px 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            align-items: center;
        }

        .admin-label {
            font-family: monospace;
            font-size: 0.65rem;
            color: #444;
            margin-right: auto;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-btn {
            font-family: monospace;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            color: #fff;
        }

        .btn-edit {
            background: #333;
        }

        .btn-edit:hover {
            background: #444;
            color: var(--accent-red);
        }

        .btn-delete {
            background: #b20710;
        }

        .btn-delete:hover {
            background: var(--accent-red);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
        }

        /* Movie Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        /* Architectural Movie Module */
        .movie-module {
            background: var(--module-bg);
            border: 1px solid var(--border-muted);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .movie-module:hover {
            border-color: var(--accent-red);
            transform: translateY(-5px);
        }

        .module-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .genre-tag {
            font-family: monospace;
            color: var(--accent-red);
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .module-body {
            padding: 0 20px 20px;
            flex-grow: 1;
            border-left: 3px solid #222;
            margin: 0 20px 20px;
            transition: border-color 0.3s;
        }

        .movie-module:hover .module-body {
            border-left-color: var(--accent-red);
        }

        .movie-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        .showtime-info {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .info-tag span { color: var(--accent-red); margin-right: 4px; }

        .movie-details {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #0f0f0f;
            border-top: 1px solid var(--border-muted);
        }

        .price-tag { font-weight: 800; font-size: 1.2rem; }
        .price-label { display: block; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }

        .view-btn {
            background-color: var(--accent-red);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <header class="page-header">
        <h1>Now <span class="text-red">Showing</span></h1>
        <p style="color: var(--text-dim); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;">Program Schedule • Level 1</p>
    </header>

    <div th:if="${not #lists.isEmpty(Movielist)}" class="movie-grid">
        <div th:each="movie : ${Movielist}" class="movie-module">

            <div sec:authorize="hasRole('ADMIN')" class="admin-controls">
                <span class="admin-label">Admin_Access_Panel</span>

                <form th:action="@{/EditingMoviePage}" method="post" style="margin: 0;">
                    <input type="hidden" name="id" th:value="${movie.id}">
                    <button type="submit" class="admin-btn btn-edit">Edit_Movie</button>
                </form>

                <form th:action="@{/DeleteMovie}" th:method="delete" style="margin: 0;">
                    <input type="hidden" name="id" th:value="${movie.id}">
                    <button type="submit" class="admin-btn btn-delete">X</button>
                </form>
            </div>

            <div class="module-header">
                <span class="genre-tag" th:text="${movie.genre}">GENRE</span>
                <span style="font-size: 0.75rem; color: var(--text-dim);" th:text="${movie.runtime_hour + 'h ' + movie.runtime_minute + 'm'}">2h 15m</span>
            </div>

            <div class="module-body">
                <h2 class="movie-title" th:text="${movie.title}">Movie Title</h2>

                <div class="showtime-info">
                    <div class="info-tag">
                        <!--<span>🕒</span>-->
                        <th:block th:text="${movie.show_time_hour + ':' + (movie.show_time_minute < 10 ? '0' + movie.show_time_minute : movie.show_time_minute)}"></th:block>
                    </div>
                    <div class="info-tag" th:if="${not #lists.isEmpty(movie.rooms)}">
                        <!--<span>🎬</span>-->
                        <th:block th:text="${movie.rooms[0].name}"></th:block>
                    </div>
                </div>

                <p class="movie-details" th:text="${movie.description}">
                    Movie description text.
                </p>
            </div>

            <div class="card-footer">
                <div class="price-container">
                    <span class="price-label">Ticket Rate</span>
                    <span class="price-tag" th:text="'$' + ${#numbers.formatDecimal(movie.cost, 1, 2)}">$0.00</span>
                </div>
                <a th:href="@{/MoviePage/{id}(id=${movie.id})}" class="view-btn">Inspect &raquo;</a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(Movielist)}" class="empty-state">
        <p>[ System Idle: No projections active ]</p>
        <a href="/" class="text-red" style="text-decoration: none; font-weight: bold; font-size: 0.8rem; text-transform: uppercase;">Return to Dashboard</a>
    </div>
</div>

</body>
</html>
