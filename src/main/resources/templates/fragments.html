<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="common-head">
  <style>
    body {
      background-color: #050505; /* Pure black base */
      margin: 0;
      padding: 0;
      /* This creates a subtle 40px grid pattern */
      background-image:
              linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
              radial-gradient(circle at 50% 0%, rgba(229, 9, 20, 0.08) 0%, transparent 60%);
      background-size: 40px 40px, 40px 40px, 100% 100%;
      background-attachment: fixed; /* Keeps the pattern still while you scroll */
    }

    /* Adds a subtle "vignette" to the corners of the screen */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
      pointer-events: none; /* Allows you to click things underneath */
      z-index: -1;
    }
  </style>
  <title></title>
</head>
<header th:fragment="navbar" class="red-ticket-nav">
  <style>
    /* REDTICKET SYSTEM NAV - V3.1 (CSS Ticket Integrated) */
    :root {
      --nav-height: 85px;
      --nav-bg: #0a0a0a;
      --nav-border: #222;
      --accent-red: #e50914;
      --text-dim: #888;
      --text-bright: #ffffff;
      --transition-main: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Navbar entry slide-down animation */
    @keyframes navSlideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* CRITICAL: Pushes page content down so it's not covered by fixed navbar */
    body {
      padding-top: var(--nav-height) !important;
      margin: 0;
    }

    .red-ticket-nav {
      background: var(--nav-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      height: var(--nav-height);
      border-bottom: 2px solid var(--accent-red);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);

      /* The animation on load */
      animation: navSlideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* --- NEW INTELLIGIBLE CSS TICKET LOGO --- */
    .rt-logo-container {
      display: flex;
      align-items: center;
      gap: 18px;
      text-decoration: none;
      transition: transform 0.3s ease;
    }

    .rt-logo-container:hover {
      transform: scale(1.05);
    }

    /* Pure CSS portrait ticket */
    .ticket-icon {
      width: 38px;
      height: 55px;
      background-color: var(--accent-red);
      border-radius: 3px;
      position: relative;
      overflow: hidden; /* Crucial for clean punch-outs */
      filter: drop-shadow(0 0 5px rgba(229, 9, 20, 0.3));
      transition: filter 0.3s ease;
    }

    .rt-logo-container:hover .ticket-icon {
      filter: drop-shadow(0 0 12px rgba(229, 9, 20, 0.6));
    }

    /* Punches on the left edge - using pseudo elements overlaying nav-bg */
    .ticket-icon::before,
    .ticket-icon::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background-color: var(--nav-bg); /* Use nav bg to 'cut' the red */
      border-radius: 50%;
      left: -7px; /* Position half off the edge */
      transition: background 0.4s ease; /* Match nav fade if used */
    }

    .ticket-icon::before { top: 12px; } /* Top punch */
    .ticket-icon::after { bottom: 12px; } /* Bottom punch */

    /* Small internal detail for realism (dashed perforation line) */
    .perforation-line {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 14px;
      border-right: 1px dashed rgba(0,0,0,0.5); /* dashed line on ticket itself */
    }

    /* Internal placeholder details */
    .ticket-detail {
      position: absolute;
      bottom: 5px;
      right: 5px;
      font-family: monospace;
      font-size: 8px;
      color: rgba(0,0,0,0.6);
      font-weight: 900;
    }

    /* --- Technical Text Treatment --- */
    .rt-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .rt-logo-text-red {
      color: var(--text-bright);
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: -1.5px;
      text-transform: uppercase;
    }

    .rt-logo-text-ticket {
      color: var(--accent-red);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* --- Primary Navigation (unchanged) --- */
    .nav-list {
      display: flex;
      align-items: center;
      gap: 40px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 10px 0;
      position: relative;
      transition: var(--transition-main);
      background: none;
      border: none;
      cursor: pointer;
    }

    .nav-link:hover { color: var(--text-bright); }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent-red);
      transition: var(--transition-main);
    }

    .nav-link:hover::after { width: 100%; }

    /* --- Admin Dropdown (unchanged) --- */
    .dropdown-container { position: relative; }

    .manage-trigger {
      background: #1a1a1a;
      color: var(--accent-red);
      border: 1px solid #333;
      padding: 8px 18px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: var(--transition-main);
    }

    .manage-trigger:hover {
      background: var(--accent-red);
      color: white;
      border-color: var(--accent-red);
      box-shadow: 0 0 15px rgba(229, 9, 20, 0.3);
    }

    .dropdown-panel {
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 15px;
      background: #141414;
      min-width: 240px;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 12px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.9);
      transition: var(--transition-main);
    }

    .dropdown-container:hover .dropdown-panel {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-panel a {
      display: block;
      padding: 12px 15px;
      color: #999;
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 2px;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .dropdown-panel a:hover {
      background: #1a1a1a;
      color: var(--accent-red);
      border-left-color: var(--accent-red);
      padding-left: 20px;
    }

    .btn-sign-out { color: var(--accent-red) !important; font-family: monospace; }
  </style>

  <a th:href="@{/}" class="rt-logo-container">
    <div class="ticket-icon">
      <div class="perforation-line"></div>
      <div class="ticket-detail">RT</div>
    </div>

    <div class="rt-logo-text">
      <span class="rt-logo-text-red">RED</span>
      <span class="rt-logo-text-ticket">TICKET</span>
    </div>
  </a>

  <nav>
    <ul class="nav-list">
      <li class="dropdown-container" sec:authorize="hasRole('ADMIN')">
        <button class="manage-trigger">ADMIN CONTROLS ▾</button>
        <div class="dropdown-panel">
          <a th:href="@{/AddingMoviePage}">+ Create_New_Movie</a>
          <a th:href="@{/AddingRoomPage}">+ Create_New_Room</a>
        </div>
      </li>

      <li><a th:href="@{/AllMovies}" class="nav-link">Showings</a></li>
      <li><a th:href="@{/Rooms}" class="nav-link">Theaters</a></li>

      <li sec:authorize="isAuthenticated()">
        <a th:href="@{/History}" class="nav-link">Tickets</a>
      </li>

      <li sec:authorize="isAuthenticated()">
        <a th:href="@{/Cart}" class="nav-link">Cart</a>
      </li>

      <li sec:authorize="isAnonymous()">
        <a th:href="@{/login}" class="nav-link">Sign_In</a>
      </li>

      <li sec:authorize="isAuthenticated()">
        <form th:action="@{/logout}" method="post" style="display: inline;">
          <button type="submit" class="nav-link btn-sign-out">Sign_Out</button>
        </form>
      </li>
    </ul>
  </nav>
</header>
</html>
