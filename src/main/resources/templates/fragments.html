<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<header th:fragment="navbar" class="main-header" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <div class="logo-box">
    <img th:src="@{/Images/RedTicketLogo.png}" alt="RedTicket Logo" class="logo-img" />
  </div>
  <nav class="nav-bar">
    <form th:action="@{/}" class="nav-form">
      <button type="submit" class="nav-btn">Home</button>
    </form>
    <form th:action="@{/Cart}" class="nav-form" sec:authorize="isAuthenticated()">
      <button type="submit" class="nav-btn">🛒 Cart</button>
    </form>
    <form th:action="@{/TicketHistory}" class="nav-form" sec:authorize="isAuthenticated()">
      <button type="submit" class="nav-btn">Purchase History</button>
    </form>

    <form th:action="@{/AllMovies}" class="nav-form">
      <button type="submit" class="nav-btn">Today's Showings</button>
    </form>
    <form th:action="@{/Rooms}" class="nav-form">
      <button type="submit" class="nav-btn">Theaters</button>
    </form>

    <div sec:authorize="isAnonymous()" style="display: flex; gap: 10px;">
      <form th:action="@{/login}" class="nav-form">
        <button type="submit" class="nav-btn login-style">Sign In</button>
      </form>
      <form th:action="@{/signup}" class="nav-form">
        <button type="submit" class="nav-btn signup-style">Sign Up</button>
      </form>
    </div>

    <div sec:authorize="isAuthenticated()">
      <form th:action="@{/logout}" method="post" class="nav-form">
        <button type="submit" class="nav-btn logout-style">Sign Out</button>
      </form>
    </div>
  </nav>
</header>

</body>
</html>
