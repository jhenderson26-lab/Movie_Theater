<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/style.css}">
    <!-- just have this for navbar styling, im not sure why the style.css won't link in some cases -->
    <style>
        .main-header {
            display: flex;
            align-items: center;
            padding: 15px 40px;
            border-bottom: 2px solid #a00000;
            background-color: black;
        }
    </style>

    <title>Your Cart</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 40px; }
        .cart-card { background: white; border-radius: 20px; padding: 30px; max-width: 800px; margin: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #e5e5ea; }
        .edit-link { color: #5856D6; text-decoration: none; font-weight: 600; font-size: 0.9em; }
        .checkout-bar { margin-top: 30px; text-align: right; }

        .remove-btn {
            background: none;
            border: none;
            color: #ff3b30; /* Apple Red */
            font-weight: 600;
            cursor: pointer;
            margin-left: 15px;
            font-size: 0.9rem;
        }

        .remove-btn:hover {
            text-decoration: underline;
        }

        .cart-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="cart-container">
    <h1>Your Cart</h1>

    <div th:each="item : ${cartItems}" class="cart-item">
        <div class="item-details">
            <h3 th:text="${item.movie.title}">Movie Title</h3>
            <p th:text="'Seat: ' + ${item.seat.seatNumber}">Seat A1</p>
        </div>

        <div class="item-actions">
            <span class="price" th:text="'$' + ${item.cost}">$0.00</span>

            <form th:action="@{/Cart/Remove/{id}(id=${item.id})}" method="post" style="display:inline;">
                <button type="submit" class="remove-btn">Remove</button>
            </form>
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(cartItems)}" class="cart-footer">
        <div class="total-section">
            <span>Total:</span>
            <h2 th:text="'$' + ${#aggregates.sum(cartItems.![cost])}">$0.00</h2>
        </div>

        <form th:action="@{/Checkout}" method="post">
            <button type="submit" class="apple-btn">Confirm Purchase</button>
        </form>
    </div>
</div>

</body>
</html>
