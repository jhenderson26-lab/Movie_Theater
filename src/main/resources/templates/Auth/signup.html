<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: common-head}">
    <title>Account Provisioning - Red Ticket</title>
</head>
<body>

<div th:replace="~{fragments :: navbar}" class="sticky-nav"></div>

<main class="main-content">
    <div class="terminal-module">

        <div class="module-header">
            <span class="header-text">SECURE_GATEWAY_V2.0 // NEW_UPLINK_INIT</span>
            <div class="header-status-light"></div>
        </div>

        <div class="module-body">
            <header class="auth-header">
                <div class="status-tag">
                    <span class="status-dot"></span> // ACCOUNT_PROVISIONING
                </div>
                <h2 class="terminal-title">SIGN_UP</h2>
            </header>

            <div th:if="${error}" class="system-alert alert-error">
                <div class="alert-content">
                    <span class="alert-title">REGISTRATION_FAILED</span>
                    <span class="alert-msg" th:text="${error}">Username already exists.</span>
                </div>
            </div>

            <form th:action="@{/signup}" th:object="${user}" method="post" class="auth-form">

                <div class="input-group-industrial">
                    <label class="input-label">SET_USER_IDENTIFIER</label>
                    <div class="input-wrapper">
                        <input type="text" th:field="*{username}" class="terminal-input" placeholder="Choose a username" required autofocus>
                        <div class="focus-indicator"></div>
                    </div>
                </div>

                <div class="input-group-industrial">
                    <label class="input-label">SET_ACCESS_PASSKEY</label>
                    <div class="input-wrapper">
                        <input type="password" th:field="*{password}" class="terminal-input" placeholder="Create a password" required>
                        <div class="focus-indicator"></div>
                    </div>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-industrial">
                        <span class="btn-inner">ESTABLISH_UPLINK</span>
                    </button>

                    <div class="auth-secondary-links">
                        <span class="label">EXISTING_IDENTIFIER?</span>
                        <a href="/login" class="tech-link">RETURN_TO_LOGIN</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>

<style>
    :root {
        --primary-red: #e61a1a;
        --dark-red: #800000;
        --bg-black: #0a0a0b;
        --panel-bg: #111113;
        --border-gray: #252527;
        --text-dim: #666;
        --font-mono: 'Roboto Mono', monospace;
    }

    body {
        background-color: var(--bg-black);
        color: white;
        font-family: 'Roboto', sans-serif;
        margin: 0;
        padding-top: 80px;
    }

    .main-content {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    /* --- TERMINAL MODULE --- */
    .terminal-module {
        background: var(--panel-bg);
        border: 1px solid var(--border-gray);
        width: 100%;
        max-width: 440px;
        box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    }

    .module-header {
        background: #1a1a1c;
        padding: 12px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-gray);
        font-family: var(--font-mono);
        font-size: 0.65rem;
        color: var(--text-dim);
    }

    .header-status-light {
        width: 7px; height: 7px;
        background: #00ff00; /* Green for "Ready to sign up" */
        border-radius: 50%;
        box-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
    }

    .module-body { padding: 50px; }

    /* --- AUTH HEADER --- */
    .auth-header { margin-bottom: 40px; text-align: left; }
    .status-tag { font-family: var(--font-mono); color: var(--text-dim); font-size: 0.7rem; margin-bottom: 10px; }
    .status-dot {
        display: inline-block; width: 6px; height: 6px;
        background: var(--primary-red); border-radius: 50%; margin-right: 8px;
    }
    .terminal-title { font-size: 2rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: -1px; }

    /* --- ALERTS --- */
    .system-alert {
        padding: 15px 20px;
        border-left: 3px solid var(--primary-red);
        margin-bottom: 30px;
        background: #161618;
        text-align: left;
    }
    .alert-title { display: block; font-family: var(--font-mono); font-size: 0.7rem; font-weight: 900; margin-bottom: 3px; }
    .alert-msg { font-size: 0.8rem; color: var(--text-dim); }

    /* --- INPUTS --- */
    .input-group-industrial { margin-bottom: 25px; text-align: left; }
    .input-label { display: block; font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dim); margin-bottom: 10px; font-weight: 700; }
    .input-wrapper { position: relative; }

    .terminal-input {
        width: 100%;
        background: #080809;
        border: 1px solid var(--border-gray);
        padding: 16px;
        color: white;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        transition: border-color 0.3s ease;
        box-sizing: border-box;
    }

    .focus-indicator {
        position: absolute;
        bottom: 0; left: 50%;
        width: 0; height: 2px;
        background: var(--primary-red);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .terminal-input:focus { outline: none; border-color: #444; }
    .terminal-input:focus ~ .focus-indicator { width: 100%; left: 0; }

    /* --- 3D BUTTON --- */
    .form-footer { margin-top: 40px; }

    .btn-industrial {
        width: 100%;
        border: none;
        cursor: pointer;
        background: var(--dark-red);
        padding: 0;
        clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
    }

    .btn-inner {
        display: block;
        padding: 18px;
        transition: transform 0.1s ease;
        text-align: center;
        font-family: var(--font-mono);
        font-weight: 900;
        background: var(--primary-red);
        color: white;
        transform: translateY(-5px);
    }

    .btn-industrial:active .btn-inner { transform: translateY(0); }
    .btn-industrial:hover .btn-inner { filter: brightness(1.1); }

    .auth-secondary-links { margin-top: 30px; font-family: var(--font-mono); font-size: 0.7rem; }
    .auth-secondary-links .label { color: #444; margin-right: 8px; }
    .tech-link { color: var(--primary-red); text-decoration: none; transition: 0.3s; }
    .tech-link:hover { opacity: 0.7; }
</style>

</body>
</html>
