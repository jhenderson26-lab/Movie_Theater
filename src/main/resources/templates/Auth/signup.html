<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account - Movie Theater</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 card p-4 shadow-sm">
            <h2 class="text-center mb-4">Join Us</h2>

            <form th:action="@{/signup}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" th:field="*{username}" class="form-control" required placeholder="Choose a username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>

            <p class="mt-3 text-center">
                Already have an account? <a href="/login">Sign In</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
