<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" class="html-root">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title class="page-title">Red Ticket Cinema</title>
</head>
<body class="body-bg">
<!-- Header Section -->
<header class="main-header">
    <div class="logo-box">
        <img src="Images/RedTicketLogo.png" alt="RedTicket Logo" class="logo-img")/>
    </div>
    <nav class="nav-bar">
        <form action="/" class="nav-form">
            <button type="submit" class="nav-btn">Home</button>
        </form>
        <form action="#" class="nav-form">
            <button type="submit" class="nav-btn">About</button>
        </form>
        <form th:action="@{/AllMovies}" class="nav-form">
            <button type="submit" class="nav-btn">Movies</button>
        </form>
        <form action="OurRooms" class="nav-form">
            <button type="submit" class="nav-btn">Rooms</button>
        </form>
    </nav>
</header>

<!-- Main Content Area -->
<main class="main-layout">
    <section class="hero-section">
        <h1 class="hero-title">Red Ticket Cinema</h1>
        <div class="image-stack">
            <div class="small-frame">
                <img src="Images/audience.jpg" class="theater-pic" alt="Audience">
            </div>
            <div class="large-frame">
                <img src="Images/seats.jpg" class="seats-pic" alt="Seats">
            </div>
        </div>
    </section>

    <!-- Right Side About Section -->
    <aside class="sidebar-red">
        <div class="about-card">
            <h2 class="about-title">About Us</h2>
            <p class="about-text">
                Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor
                incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis
                nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.
            </p>
        </div>
    </aside>
</main>
</body>
</html>
