<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: common-head}">
    <title>Initialize Record // RedTicket</title>
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<main class="rt-main-content">
    <div class="rt-terminal-module">

        <div class="rt-module-header">
            <span class="rt-header-text">DATABASE_MGMT_V2.0 // NEW_RECORD_ENTRY</span>
            <div class="rt-header-status-light"></div>
        </div>

        <div class="rt-module-body">
            <header class="rt-auth-header">
                <div class="rt-status-tag">
                    <span class="rt-status-dot"></span> // RECORD_INITIALIZATION
                </div>
                <h2 class="rt-terminal-title">ADD_NEW_MOVIE</h2>
            </header>

            <form th:action="@{/AddedNewMovie}" method="POST" class="rt-industrial-form">

                <div class="rt-input-group full-width">
                    <label class="rt-input-label">SET_METADATA // TITLE</label>
                    <div class="rt-input-wrapper">
                        <input type="text" name="title" class="rt-terminal-input" placeholder="e.g. INCEPTION" required autofocus>
                        <div class="rt-focus-indicator"></div>
                    </div>
                </div>

                <div class="rt-input-group">
                    <label class="rt-input-label">CATEGORY_TAG</label>
                    <div class="rt-input-wrapper">
                        <select name="genre" class="rt-terminal-input" required>
                            <option value="" disabled selected>-- SELECT CATEGORY --</option>
                            <option value="action">ACTION</option>
                            <option value="comedy">COMEDY</option>
                            <option value="drama">DRAMA</option>
                            <option value="sci-fi">SCI-FI</option>
                            <option value="horror">HORROR</option>
                        </select>
                        <div class="rt-focus-indicator"></div>
                    </div>
                </div>

                <div class="rt-input-group">
                    <label class="rt-input-label">RELEASE_STAMP</label>
                    <div class="rt-input-wrapper">
                        <input type="date" name="releaseYear" class="rt-terminal-input" required>
                        <div class="rt-focus-indicator"></div>
                    </div>
                </div>

                <div class="rt-input-group">
                    <label class="rt-input-label">SHOW_HOUR (24H)</label>
                    <div class="rt-input-wrapper">
                        <input type="number" name="show_time_hour" class="rt-terminal-input" min="0" max="23" placeholder="00" required>
                        <div class="rt-focus-indicator"></div>
                    </div>
                </div>

                <div class="rt-input-group">
                    <label class="rt-input-label">SHOW_MINUTE</label>
                    <div class="rt-input-wrapper">
                        <input type="number" name="show_time_minute" class="rt-terminal-input" min="0" max="59" placeholder="00" required>
                        <div class="rt-focus-indicator"></div>
                    </div>
                </div>

                <div class="rt-input-group">
                    <label class="rt-input-label">ASSIGNED_FACILITY</label>
                    <div class="rt-input-wrapper">
                        <select name="room" class="rt-terminal-input" required>
                            <option value="" disabled selected>-- SELECT ROOM --</option>
                            <option th:each="room : ${Roomlist}"
                                    th:value="${room.id}"
                                    th:text="${room.name}">
                            </option>
                        </select>
                        <div class="rt-focus-indicator"></div>
                    </div>
                </div>

                <div class="rt-input-group">
                    <label class="rt-input-label">UNIT_VAL_USD ($)</label>
                    <div class="rt-input-wrapper">
                        <input type="number" name="cost" step="0.01" class="rt-terminal-input" placeholder="0.00" required>
                        <div class="rt-focus-indicator"></div>
                    </div>
                </div>

                <div class="rt-input-group full-width">
                    <label class="rt-input-label">SYSTEM_DESCRIPTION_LOG</label>
                    <div class="rt-input-wrapper">
                        <textarea name="description" class="rt-terminal-input" rows="4" placeholder="ENTER SYSTEM DESCRIPTION..." required></textarea>
                        <div class="rt-focus-indicator"></div>
                    </div>
                </div>

                <div class="rt-form-footer full-width">
                    <a href="javascript:history.back()" class="rt-btn-cancel">ABORT_ENTRY</a>
                    <button type="submit" class="rt-btn-industrial">
                        <span class="rt-btn-inner">CREATE_MOVIE</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<style>
    /* COMPONENT STYLES PRE-LOCKED FOR REDTICKET INDUSTRIAL */
    .rt-main-content {
        padding: 110px 20px 60px; /* Buffer for fixed navbar */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }

    .rt-terminal-module {
        background: #111113;
        border: 1px solid #252527;
        width: 100%;
        max-width: 650px;
        box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    }

    .rt-module-header {
        background: #1a1a1c;
        padding: 12px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #252527;
        font-family: 'Roboto Mono', monospace;
        font-size: 0.65rem;
        color: #555;
    }

    .rt-header-status-light {
        width: 8px; height: 8px;
        background: #00ff00;
        border-radius: 50%;
        box-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
    }

    .rt-module-body { padding: 45px; }

    .rt-auth-header { margin-bottom: 35px; }
    .rt-status-tag { font-family: 'Roboto Mono', monospace; color: #444; font-size: 0.7rem; margin-bottom: 10px; }
    .rt-status-dot { display: inline-block; width: 6px; height: 6px; background: var(--primary-red); border-radius: 50%; margin-right: 8px; }
    .rt-terminal-title { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: -1px; }

    /* FORM GRID */
    .rt-industrial-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .full-width { grid-column: span 2; }

    .rt-input-group { text-align: left; }
    .rt-input-label { display: block; font-family: 'Roboto Mono', monospace; font-size: 0.7rem; color: #666; margin-bottom: 10px; font-weight: 700; }

    .rt-input-wrapper { position: relative; }
    .rt-terminal-input {
        width: 100%;
        background: #080809;
        border: 1px solid #252527;
        padding: 14px;
        color: white;
        font-family: 'Roboto Mono', monospace;
        font-size: 0.9rem;
        box-sizing: border-box;
    }

    .rt-focus-indicator {
        position: absolute;
        bottom: 0; left: 50%;
        width: 0; height: 2px;
        background: var(--primary-red);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .rt-terminal-input:focus { outline: none; border-color: #444; }
    .rt-terminal-input:focus ~ .rt-focus-indicator { width: 100%; left: 0; }

    /* MECHANICAL BUTTONS */
    .rt-form-footer {
        display: flex;
        gap: 20px;
        margin-top: 35px;
        align-items: center;
    }

    .rt-btn-cancel {
        flex: 1;
        text-align: center;
        color: #444;
        font-family: 'Roboto Mono', monospace;
        font-size: 0.75rem;
        font-weight: 900;
        text-decoration: none;
        border: 1px solid #222;
        padding: 15px;
        transition: all 0.2s;
    }

    .rt-btn-cancel:hover { color: #fff; border-color: #666; }

    .rt-btn-industrial {
        flex: 2;
        border: none;
        cursor: pointer;
        background: #800000;
        padding: 0;
        clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
    }

    .rt-btn-inner {
        display: block;
        padding: 18px;
        transition: transform 0.1s ease;
        text-align: center;
        font-family: 'Roboto Mono', monospace;
        font-weight: 900;
        background: var(--primary-red);
        color: white;
        transform: translateY(-5px);
    }

    .rt-btn-industrial:active .rt-btn-inner { transform: translateY(0); }
    .rt-btn-industrial:hover .rt-btn-inner { filter: brightness(1.1); }
</style>

</body>
</html>
